<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반짝반짝 출석부</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.5.1 (장식용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 온글잎 박다현 폰트 임포트 */
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }
        
        :root {
            --primary: #ff85a1;
            --secondary: #a78bfa;
            --accent: #fde047;
            --bg: #fdf2f8;
        }

        /* 전체 폰트 적용 */
        * { 
            font-family: 'OngleipParkDahyeon', sans-serif !important; 
            letter-spacing: -0.02em;
        }
        
        body {
            background-color: var(--bg);
            /* 모눈종이 패턴 배경 */
            background-image: 
                linear-gradient(#f9a8d415 1px, transparent 1px),
                linear-gradient(90deg, #f9a8d415 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spinner { animation: spin 1s linear infinite; }

        .soft-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 12px 30px -5px rgba(244, 114, 182, 0.15);
            border: 2px solid white;
        }

        .bubble-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 4px solid rgba(0,0,0,0.1);
        }
        .bubble-btn:active {
            transform: scale(0.96) translateY(2px);
            border-bottom-width: 1px;
        }

        /* 고양이 아이콘 텍스트 스타일 (특수 문자 입력 시 고양이로 변환) */
        .cat-deco {
            color: var(--primary);
            font-size: 1.5rem;
            display: inline-block;
            margin: 0 4px;
        }

        input::placeholder, textarea::placeholder {
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body class="antialiased">
    <div id="loading-screen">
        <div class="text-rose-400 text-6xl mb-6 floating">†</div> <!-- 고양이 아이콘 -->
        <div class="text-rose-500 font-bold text-2xl">로딩 중이다냥.. ¢</div>
        <div class="mt-4 text-slate-400 text-sm">잠시만 기다려 주십시오.</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxn5eeJ3qsdj0xDbJRQQgVtR9Thgbe6V3_YPcHHkdnaBfwHREaFmvigx_LLeK7G9YKI/exec";

        function App() {
            const [appId, setAppId] = useState(new URLSearchParams(window.location.search).get('id') || 'default');
            const [view, setView] = useState('checkin'); 
            const [isLoading, setIsLoading] = useState(false);
            const [isConfigLoading, setIsConfigLoading] = useState(true);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [config, setConfig] = useState({
                id: appId, className: '', formUrl: '', passcode: '0000',
                studentIdEntry: '', nameEntry: '', reasonEntry: ''
            });
            const [studentId, setStudentId] = useState('');
            const [studentName, setStudentName] = useState('');
            const [reason, setReason] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }, 800);
                }
                fetchConfig();
            }, [appId]);

            const fetchConfig = () => {
                setIsConfigLoading(true);
                fetch(`${GOOGLE_SCRIPT_URL}?id=${appId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.className) setConfig(data);
                        else setConfig(prev => ({ ...prev, id: appId }));
                        setIsConfigLoading(false);
                    })
                    .catch(() => setIsConfigLoading(false));
            };

            const handleSaveSettings = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(config)
                    });
                    setMsg({ type: 'success', text: '설정이 저장되었습니다.' });
                    setTimeout(() => setMsg({ type: '', text: '' }), 3000);
                } catch (err) {
                    alert('저장 중 오류가 발생했습니다.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleCheckIn = async (e) => {
                e.preventDefault();
                if (!config.formUrl) return alert('양식 URL을 먼저 입력해 주십시오.');
                
                setIsLoading(true);
                const formResponseUrl = config.formUrl.replace('/viewform', '/formResponse');
                const formData = new URLSearchParams();
                
                const fId = (id) => id.toString().startsWith('entry.') ? id : `entry.${id}`;
                formData.append(fId(config.studentIdEntry), studentId);
                formData.append(fId(config.nameEntry), studentName);
                if (config.reasonEntry && reason) {
                    formData.append(fId(config.reasonEntry), reason);
                }

                try {
                    await fetch(formResponseUrl, { method: 'POST', mode: 'no-cors', body: formData.toString() });
                    setMsg({ type: 'success', text: `${studentName}님, 출석이 완료되었습니다.` });
                    setStudentId(''); setStudentName(''); setReason('');
                    setTimeout(() => setMsg({ type: '', text: '' }), 4000);
                } catch (err) {
                    setMsg({ type: 'error', text: '전송 오류가 발생했습니다.' });
                } finally {
                    setIsLoading(false);
                }
            };

            const copyShareLink = () => {
                const url = `${window.location.origin}${window.location.pathname}?id=${appId}`;
                navigator.clipboard.writeText(url);
                alert('링크가 복사되었습니다.');
            };

            if (isConfigLoading) return (
                <div className="flex flex-col items-center justify-center h-screen space-y-4 bg-[#fdf2f8]">
                    <span className="text-4xl cat-deco">♤</span>
                    <p className="font-bold text-rose-400 text-xl">정보를 불러오는 중이다냥..</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative bg-[#fdf2f8]/30 overflow-hidden border-x border-pink-100">
                    
                    {/* 배경 장식 고양이들 */}
                    <div className="absolute top-10 left-6 text-2xl opacity-20 floating">♤</div>
                    <div className="absolute top-40 right-8 text-2xl opacity-20 floating delay-150">♧</div>
                    <div className="absolute bottom-60 left-10 text-2xl opacity-20 floating delay-300">†</div>

                    <header className="relative z-10 px-8 pt-12 pb-6 text-center">
                        <div className="inline-block px-6 py-2 rounded-full bg-white shadow-sm border border-pink-100 mb-4 transform -rotate-1">
                            <h1 className="text-2xl font-bold text-pink-500 flex items-center gap-2">
                                <span>£</span> {config.className || "출석 관리 시스템"} <span>¢</span>
                            </h1>
                        </div>
                        <p className="text-xs font-bold text-pink-300 uppercase tracking-widest">Class ID: {appId}</p>
                    </header>

                    <main className="relative z-10 p-6 flex-grow pb-32">
                        {view === 'checkin' ? (
                            <div className="space-y-6 animate-in fade-in zoom-in duration-500">
                                {/* 시계 섹션 */}
                                <div className="soft-card p-6 text-center">
                                    <div className="text-5xl font-bold text-slate-700 tracking-tight mb-2">
                                        {currentTime.toLocaleTimeString('ko-KR', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'})}
                                    </div>
                                    <div className="flex items-center justify-center gap-2 text-pink-400 text-sm font-bold">
                                        <span>♤</span> 실시간 출석 확인 시스템 <span>♧</span>
                                    </div>
                                </div>

                                {/* 입력 폼 */}
                                <form onSubmit={handleCheckIn} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">†</span> 학번
                                        </label>
                                        <input className="w-full p-4 rounded-2xl border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-lg transition-all shadow-sm" 
                                               placeholder="예: 30521" value={studentId} onChange={e=>setStudentId(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">£</span> 성명
                                        </label>
                                        <input className="w-full p-4 rounded-2xl border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold text-lg transition-all shadow-sm" 
                                               placeholder="성명을 입력하십시오" value={studentName} onChange={e=>setStudentName(e.target.value)} required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-sm font-bold text-slate-500 ml-4 flex items-center gap-2">
                                            <span className="text-pink-400">¢</span> 사유 입력
                                        </label>
                                        <textarea className="w-full p-4 rounded-2xl border-2 border-white bg-white/70 focus:bg-white focus:border-pink-300 outline-none font-bold min-h-[120px] resize-none transition-all shadow-sm" 
                                               placeholder="지각 조퇴 결석 시 사유를 입력하세요" value={reason} onChange={e=>setReason(e.target.value)} />
                                    </div>
                                    <button disabled={isLoading} className="bubble-btn w-full bg-pink-400 hover:bg-pink-500 text-white font-bold py-5 rounded-3xl shadow-lg transition-all text-xl mt-4 flex items-center justify-center gap-2">
                                        {isLoading ? <i className="fa-solid fa-spinner loading-spinner"></i> : "출석 완료했다냥!"}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border border-pink-100 shadow-sm">
                                    <h2 className="text-lg font-bold text-pink-500 flex items-center gap-2">
                                        <span>⚙️</span> 환경 설정
                                    </h2>
                                    <button onClick={copyShareLink} className="text-xs bg-pink-50 text-pink-500 px-4 py-2 rounded-full font-bold border border-pink-100">
                                        주소 복사
                                    </button>
                                </div>
                                
                                <form onSubmit={handleSaveSettings} className="soft-card p-6 space-y-4">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 ml-1">학급 명칭</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" 
                                                   value={config.className} onChange={e=>setConfig({...config, className:e.target.value})} required />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 ml-1">구글 폼 URL</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent text-xs font-bold" 
                                                   value={config.formUrl} onChange={e=>setConfig({...config, formUrl:e.target.value})} required />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 ml-1">학번 ID</label>
                                                <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" 
                                                       value={config.studentIdEntry} onChange={e=>setConfig({...config, studentIdEntry:e.target.value})} required />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 ml-1">성명 ID</label>
                                                <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" 
                                                       value={config.nameEntry} onChange={e=>setConfig({...config, nameEntry:e.target.value})} required />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 ml-1">사유 입력 ID (선택)</label>
                                            <input className="w-full p-3 border-b-2 border-pink-50 outline-none focus:border-pink-300 bg-transparent font-bold" 
                                                   value={config.reasonEntry} onChange={e=>setConfig({...config, reasonEntry:e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <button disabled={isLoading} className="bubble-btn w-full bg-slate-700 text-white font-bold py-4 rounded-2xl shadow-md mt-4">
                                        설정 저장하기
                                    </button>
                                </form>
                            </div>
                        )}

                        {msg.text && (
                            <div className={`mt-8 p-5 rounded-3xl text-center font-bold text-sm border-2 animate-in slide-in-from-top duration-500 ${msg.type === 'success' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                                {msg.text}
                            </div>
                        )}
                    </main>

                    {/* 하단 내비게이션 바 */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-md border border-pink-100 flex justify-around p-3 rounded-[2.5rem] shadow-xl z-50">
                        <button onClick={()=>setView('checkin')} className={`flex flex-col items-center gap-1 px-8 py-2 rounded-full transition-all ${view==='checkin' ? 'bg-pink-400 text-white shadow-md scale-105' : 'text-slate-300'}`}>
                            <span className="text-2xl mb-1">{view==='checkin' ? '🐾' : '📝'}</span>
                            <span className="text-xs font-bold uppercase tracking-widest">출석 확인</span>
                        </button>
                        <button onClick={()=>setView('settings')} className={`flex flex-col items-center gap-1 px-8 py-2 rounded-full transition-all ${view==='settings' ? 'bg-pink-200 text-white shadow-md scale-105' : 'text-slate-300'}`}>
                            <span className="text-2xl mb-1">{view==='settings' ? '⚙️' : '🎀'}</span>
                            <span className="text-xs font-bold uppercase tracking-widest">환경 설정</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
